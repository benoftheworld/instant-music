name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # ── Linters ────────────────────────────────────────────────────────────────

  lint-python:
    name: Lint Python (ruff + bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements/*.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-
      - name: Install ruff & bandit
        run: pip install ruff bandit
      - name: ruff check
        run: ruff check backend/
      - name: ruff format check
        run: ruff format --check backend/
      - name: bandit security scan
        run: bandit -r backend/ -c pyproject.toml -ll -q

  lint-frontend:
    name: Lint Frontend (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: cd frontend && npm ci
      - name: ESLint
        run: cd frontend && npm run lint

  typecheck-backend:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mypy-${{ hashFiles('backend/requirements/development.txt') }}
          restore-keys: ${{ runner.os }}-pip-mypy-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements/development.txt
      - name: mypy
        run: cd backend && mypy . --config-file pyproject.toml

  lint-docker:
    name: Lint Dockerfiles (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true
          config: _devops/linter/.hadolint.yaml

  lint-shell:
    name: Lint shell scripts (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning

  lint-yaml:
    name: Lint YAML (yamllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: yamllint -c _devops/linter/.yamllint.yml .

  # ── Security ───────────────────────────────────────────────────────────────

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  trivy-scan:
    name: Container vulnerability scan (trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t instant-music-backend:ci ./backend
      - name: Run Trivy on backend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: instant-music-backend:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
      - name: Build frontend image
        run: docker build -t instant-music-frontend:ci ./frontend
      - name: Run Trivy on frontend image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: instant-music-frontend:ci
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH

  sbom:
    name: Generate SBOM (Syft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t instant-music-backend:ci ./backend
      - name: Generate SBOM for backend
        uses: anchore/sbom-action@v0
        with:
          image: instant-music-backend:ci
          artifact-name: sbom-backend.spdx.json
          format: spdx-json
      - name: Build frontend image
        run: docker build -t instant-music-frontend:ci ./frontend
      - name: Generate SBOM for frontend
        uses: anchore/sbom-action@v0
        with:
          image: instant-music-frontend:ci
          artifact-name: sbom-frontend.spdx.json
          format: spdx-json

  # ── Tests ──────────────────────────────────────────────────────────────────

  backend-tests:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('backend/requirements/development.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements/development.txt
      - name: Run backend tests
        run: |
          cd backend
          pytest -q

  frontend-tests:
    name: Frontend tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        run: |
          cd frontend
          npm ci
      - name: Run frontend tests
        run: |
          cd frontend
          npm test --silent
