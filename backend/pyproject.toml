[tool.black]
line-length = 120
target-version = ['py311']
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
  | migrations
)/
'''

[tool.isort]
profile = "black"
multi_line_output = 3
line_length = 120
skip_glob = ["*/migrations/*"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
warn_unused_ignores = true
check_untyped_defs = true
disallow_untyped_defs = false   # enable progressively — set true per-module
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "apps.games.services",
    "apps.games.broadcast_service",
    "apps.games.lyrics_service",
    "apps.games.signals",
    "apps.playlists.youtube_service",
    "apps.playlists.deezer_service",
    "apps.achievements.services",
]
disallow_untyped_defs = true
