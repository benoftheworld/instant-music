# Exclude a variety of commonly ignored directories.
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "docs",
    "db-data",
    "dev",
    "**/__init__.py",
    "apps/*/migrations/*"
]

# Same as Black.
line-length = 88
indent-width = 4

[lint]

# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`)  codes by default.
# Unlike Flake8, Ruff doesn't enable pycodestyle warnings (`W`) or
# McCabe complexity (`C901`) by default.
select = ["I", "D", "E", "F", "UP", "B", "SIM"]
ignore = [
    "D203",  # one-blank-line-before-class (conflicts with D211)
    "D211",  # no-blank-line-before-class
    "D213",  # multi-line-summary-second-line (conflicts with D212)
    "UP007", # use-x-or-y-union
    "D105",  # missing-docstring-in-magic-method (__str__, etc.)
    "D106",  # missing-docstring-in-public-nested-class (Django Meta classes)
    "D107",  # missing-docstring-in-__init__
]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
# Django settings split pattern: star import from base is intentional
"config/settings/production.py" = ["F405"]
# Test files: docstrings on test methods are not required
"**/tests*.py" = ["D100", "D101", "D102", "D103"]
"**/conftest.py" = ["D100", "D101", "D102", "D103"]

[format]

# Like Black, use double quotes for strings.
quote-style = "double"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
#
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = false

# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = 72
