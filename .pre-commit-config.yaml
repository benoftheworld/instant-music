repos:
  # ── General file hygiene ───────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-toml
      - id: debug-statements

  # ── Python: ruff (replaces black + isort + flake8) ────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff           # lint + auto-fix (isort included via rule I)
        args: [--fix]
        files: ^backend/
      - id: ruff-format    # formatter (replaces black)
        files: ^backend/

  # ── Python: bandit security scan ──────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-ll"]
        files: ^backend/
        exclude: ^backend/apps/.*/migrations/|^backend/.*tests.*\.py$

  # ── Frontend: prettier ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: ^frontend/
        types_or: [javascript, jsx, ts, tsx, css, json]
