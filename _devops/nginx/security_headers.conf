# Fichier inclus dans les blocs server{} et location{} qui ont leur propre add_header.
# nginx ne propage PAS les add_header parents si un bloc enfant en définit un — ce fichier
# évite la duplication manuelle et garantit la cohérence des en-têtes de sécurité.

# ── Transport ────────────────────────────────────────────────────────────────
# HSTS : 1 an, sous-domaines inclus, éligible au preload HSTS
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ── Clickjacking ─────────────────────────────────────────────────────────────
add_header X-Frame-Options "DENY" always;

# ── Sniffing MIME ────────────────────────────────────────────────────────────
add_header X-Content-Type-Options "nosniff" always;

# ── XSS filter hérité (désactivé — le filtre natif de l'ancien Chrome/IE
#    pouvait être détourné pour injecter du code ; CSP est la vraie défense)
add_header X-XSS-Protection "0" always;

# ── Referrer ─────────────────────────────────────────────────────────────────
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Permissions (accès aux APIs navigateur) ──────────────────────────────────
# interest-cohort supprimé (FLoC abandonné par Google en 2022 ; Chrome 109+
# n'accepte plus ce token et le signale comme erreur dans la console).
# fullscreen et web-share autorisés sur l'origine propre (UX du quiz).
add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), battery=(), camera=(), display-capture=(), document-domain=(), encrypted-media=(self), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), usb=(), web-share=(self), xr-spatial-tracking=()" always;

# ── Cross-Origin isolation ────────────────────────────────────────────────────
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;

# ── Content Security Policy ───────────────────────────────────────────────────
# Adapté à l'usage réel de l'app :
#   - WebSocket vers le même domaine (wss://)
#   - Deezer CDN pour les aperçus audio et les pochettes (*.dzcdn.net)
#   - Google OAuth (accounts.google.com)
#   - YouTube IFrame API + lecteur embarqué (mode Karaoké)
#   - Google Fonts CDN pour Jazzmin admin theme (fonts.googleapis.com, fonts.gstatic.com)
#   - style-src 'unsafe-inline' conservé pour Tailwind / React inline styles
#   - worker-src 'none' : pas de Service Worker
#   - manifest-src 'self' : manifeste PWA servi localement
# Note : retirer 'unsafe-inline' de script-src une fois validé avec CSP Report-Only.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.youtube.com https://s.ytimg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.dzcdn.net https://i.ytimg.com https://i9.ytimg.com; media-src 'self' https://*.dzcdn.net; connect-src 'self' wss://benoftheworld.fr https://api.deezer.com https://accounts.google.com https://www.youtube.com; font-src 'self' https://fonts.gstatic.com; frame-src 'none' https://www.youtube.com https://www.youtube-nocookie.com; frame-ancestors 'none'; worker-src 'none'; manifest-src 'self'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests;" always;
