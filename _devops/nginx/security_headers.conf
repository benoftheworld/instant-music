# Fichier inclus dans les blocs server{} et location{} qui ont leur propre add_header.
# nginx ne propage PAS les add_header parents si un bloc enfant en définit un — ce fichier
# évite la duplication manuelle et garantit la cohérence des en-têtes de sécurité.

# ── Transport ────────────────────────────────────────────────────────────────
# HSTS : 1 an, sous-domaines inclus, éligible au preload HSTS
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# ── Clickjacking ─────────────────────────────────────────────────────────────
add_header X-Frame-Options "DENY" always;

# ── Sniffing MIME ────────────────────────────────────────────────────────────
add_header X-Content-Type-Options "nosniff" always;

# ── Referrer ─────────────────────────────────────────────────────────────────
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Permissions (accès aux APIs navigateur) ──────────────────────────────────
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

# ── Cross-Origin isolation ────────────────────────────────────────────────────
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;

# ── Content Security Policy ───────────────────────────────────────────────────
# Adapté à l'usage réel de l'app :
#   - WebSocket vers le même domaine (wss://)
#   - Deezer CDN pour les aperçus audio et les pochettes (*.dzcdn.net)
#   - Google OAuth (accounts.google.com)
#   - style-src 'unsafe-inline' conservé pour Tailwind / React inline styles
# Note : retirer 'unsafe-inline' de script-src une fois validé avec CSP Report-Only.
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.dzcdn.net; media-src 'self' https://*.dzcdn.net; connect-src 'self' wss://benoftheworld.fr https://api.deezer.com https://accounts.google.com; font-src 'self'; frame-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests;" always;
