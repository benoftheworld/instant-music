# nginx-init.conf — Configuration HTTP-only pour l'obtention initiale des certificats SSL
#
# Ce fichier est utilisé UNIQUEMENT lors de la première installation via :
#   make ssl-init DOMAIN=benoftheworld.fr EMAIL=admin@benoftheworld.fr
#
# Il démarre nginx sans SSL pour permettre à certbot de compléter
# le challenge ACME (webroot). Une fois les certs obtenus, nginx
# redémarre automatiquement avec nginx.conf (config SSL complète).

events {
    worker_connections 1024;
}

http {
    server {
        listen 80;
        server_name _;

        # ACME challenge — certbot écrit ici avec --webroot -w /var/www/certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Health check / page d'attente
        location / {
            return 200 "InstantMusic — initialisation SSL en cours...\n";
            add_header Content-Type text/plain;
        }
    }
}
