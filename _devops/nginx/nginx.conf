user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Ne pas exposer la version nginx dans les réponses et pages d'erreur
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # ── Upstream backend ────────────────────────────────────────────────────
    # least_conn distribue les requêtes vers le worker le moins chargé.
    # keepalive 32 : pool de 32 connexions persistantes par worker nginx vers
    # le backend — réduit l'overhead TCP/TLS lors du scaling horizontal.
    upstream backend {
        least_conn;
        server backend:8000;
        keepalive 32;
    }

    # ── Upstream frontend ────────────────────────────────────────────────────
    upstream frontend_app {
        server frontend:80;
        keepalive 16;
    }

    # Redirect all HTTP (www and non-www) → HTTPS non-www
    server {
        listen 80;
        server_name benoftheworld.fr www.benoftheworld.fr;

        # ACME challenge — doit être AVANT le redirect HTTPS
        # Utilisé par certbot pour renouveler les certificats
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://benoftheworld.fr$request_uri;
        }
    }

    # Main HTTPS server (cert only covers benoftheworld.fr)
    server {
        listen 443 ssl;
        http2 on;
        server_name benoftheworld.fr;

        # SSL — Let's Encrypt certificates (gérés par le service certbot)
        ssl_certificate /etc/letsencrypt/live/benoftheworld.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/benoftheworld.fr/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/benoftheworld.fr/chain.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers (définies dans un fichier include pour éviter
        # la perte d'héritage nginx dans les blocs location avec add_header)
        include /etc/nginx/security_headers.conf;

        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API requests
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }

        location /api/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://backend;
        }

        # WebSocket support (wss://)
        location /ws/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # Static files — add_header redéfini ici, donc on ré-inclut les security headers
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            include /etc/nginx/security_headers.conf;
        }

        # Media files — idem
        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            include /etc/nginx/security_headers.conf;
        }

        # Django admin
        location /admin/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Monitoring (actif uniquement avec make monitoring-up-prod) ──────
        # Protégé par HTTP Basic Auth.
        # Créer le fichier de mots de passe avec : make monitoring-htpasswd
        #
        # Les upstreams monitoring utilisent des variables + resolver Docker
        # pour que nginx démarre même si les services monitoring ne tournent pas.
        # Si le monitoring n'est pas lancé, ces endpoints renvoient simplement 502.
        resolver 127.0.0.11 valid=30s ipv6=off;

        location /grafana/ {
            auth_basic "Monitoring";
            auth_basic_user_file /etc/nginx/monitoring/.htpasswd;
            # CSP spécifique Grafana : unsafe-eval requis + X-Frame-Options SAMEORIGIN
            include /etc/nginx/security_headers_grafana.conf;
            set $grafana_upstream http://grafana:3000;
            proxy_pass $grafana_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /prometheus/ {
            auth_basic "Monitoring";
            auth_basic_user_file /etc/nginx/monitoring/.htpasswd;
            set $prometheus_upstream http://prometheus:9090;
            rewrite ^/prometheus/(.*) /$1 break;
            proxy_pass $prometheus_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /kibana/ {
            auth_basic "Monitoring";
            auth_basic_user_file /etc/nginx/monitoring/.htpasswd;
            set $kibana_upstream http://kibana:5601;
            rewrite ^/kibana/(.*) /kibana/$1 break;
            proxy_pass $kibana_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
