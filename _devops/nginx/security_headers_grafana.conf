# Headers de sécurité adaptés pour Grafana.
# Inclus dans le bloc location /grafana/ à la place de security_headers.conf.
#
# Différences avec security_headers.conf :
#   - script-src : ajout de 'unsafe-eval' (requis par le runtime Angular/React de Grafana)
#   - X-Frame-Options : SAMEORIGIN au lieu de DENY (Grafana intègre des iframes pour ses panneaux)

add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.dzcdn.net; media-src 'self' https://*.dzcdn.net; connect-src 'self' wss://benoftheworld.fr https://api.deezer.com https://accounts.google.com; font-src 'self'; frame-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none';" always;
