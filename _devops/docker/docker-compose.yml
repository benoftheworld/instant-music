services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: instantmusic_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=instantmusic
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Cache & WebSocket Broker)
  redis:
    image: redis:7-alpine
    container_name: instantmusic_redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: instantmusic_backend
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload --proxy-headers --loop uvloop --http h11
    volumes:
      - ../../backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - '8000:8000'
    env_file:
      - ../../backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=True
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/api/health/']
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # Celery Worker (Async Tasks)
  celery:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: instantmusic_celery
    command: celery -A config worker -l info
    volumes:
      - ../../backend:/app
    env_file:
      - ../../backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=True
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ['CMD-SHELL', 'celery -A config inspect ping -d celery@$$HOSTNAME --timeout=5 -q || exit 1']
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 3

  # Celery Beat (Scheduled Tasks)
  celery-beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: instantmusic_celery_beat
    command: celery -A config beat -l info --pidfile=/app/celerybeat.pid
    volumes:
      - ../../backend:/app
    env_file:
      - ../../backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DEBUG=True
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ['CMD-SHELL', 'test -f /app/celerybeat.pid || exit 1']
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    container_name: instantmusic_frontend
    command: npm run dev
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    ports:
      - '3000:3000'
    env_file:
      - ../../frontend/.env
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:3000
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:3000 || exit 1']
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

volumes:
  postgres_data:
  static_volume:
  media_volume:
