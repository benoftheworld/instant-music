name: instantmusic

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: instantmusic_db_prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env.prod
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Redis (Cache & WebSocket Broker)
  redis:
    image: redis:7-alpine
    container_name: instantmusic_redis_prod
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Django Backend
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    container_name: instantmusic_backend_prod
    command: gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 --workers 4 --log-level info
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - '8000'
    env_file:
      - ./.env.prod
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # Celery Worker (Async Tasks)
  celery:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    container_name: instantmusic_celery_prod
    command: celery -A config worker -l info
    volumes:
      - media_volume:/app/media
    env_file:
      - ./.env.prod
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - app-network

  # Celery Beat (Scheduled Tasks)
  celery-beat:
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    container_name: instantmusic_celery_beat_prod
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - media_volume:/app/media
    env_file:
      - ./.env.prod
    depends_on:
      - db
      - redis
    restart: unless-stopped
    networks:
      - app-network

  # React Frontend (Build + Nginx)
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
    container_name: instantmusic_frontend_prod
    restart: unless-stopped
    networks:
      - app-network

  # Nginx (Reverse Proxy)
  nginx:
    image: nginx:alpine
    container_name: instantmusic_nginx_prod
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/monitoring:/etc/nginx/monitoring:ro
      - static_volume:/app/staticfiles:ro
      - media_volume:/app/media:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    ports:
      - '80:80'
      - '443:443'
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - app-network

  # Certbot (renouvellement automatique des certificats SSL)
  certbot:
    image: certbot/certbot:latest
    container_name: instantmusic_certbot_prod
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    # Renouvelle automatiquement le certificat toutes les 12h
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done'
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  letsencrypt:
  certbot_webroot:

networks:
  app-network:
    driver: bridge
