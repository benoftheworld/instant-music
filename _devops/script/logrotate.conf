# Configuration logrotate pour InstantMusic
#
# Installation (une seule fois sur le serveur) :
#   sudo cp _devops/script/logrotate.conf /etc/logrotate.d/instantmusic
#   sudo logrotate -d /etc/logrotate.d/instantmusic   # test à sec
#   sudo logrotate -f /etc/logrotate.d/instantmusic   # force une rotation immédiate
#
# La rotation automatique est déclenchée par le timer systemd logrotate.timer
# ou par /etc/cron.daily/logrotate — aucune configuration cron supplémentaire n'est requise.
#
# Ajuster le chemin /opt/instantmusic selon votre répertoire de déploiement.

# ── Logs Django applicatifs ──────────────────────────────────────────
/opt/instantmusic/backend/logs/django.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    # Pas de postrotate nécessaire : Python's RotatingFileHandler gère
    # déjà la rotation par taille. Ce bloc gère la rotation temporelle
    # et la compression des archives.
    sharedscripts
    postrotate
        # Signale au process Django de ré-ouvrir le fichier de log
        # (nécessaire uniquement si l'application écrit directement dans le fichier
        # sans RotatingFileHandler — ici c'est une sécurité supplémentaire)
        if [ -f /opt/instantmusic/backend/logs/django.pid ]; then
            kill -USR1 $(cat /opt/instantmusic/backend/logs/django.pid) 2>/dev/null || true
        fi
    endscript
}

# ── Logs erreurs uniquement ──────────────────────────────────────────
/opt/instantmusic/backend/logs/errors.log
/opt/instantmusic/backend/logs/errors.log.* {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    # Conservation : 12 semaines = 3 mois d'historique des erreurs
}

# ── Logs Docker (json-file driver) ──────────────────────────────────
# Docker gère sa propre rotation via max-size/max-file dans docker-compose.
# Ces fichiers sont dans /var/lib/docker/containers/<id>/<id>-json.log
# et sont automatiquement rotés par Docker — pas besoin de logrotate ici.
#
# Pour vérifier l'espace utilisé par les logs Docker :
#   docker system df
#   du -sh /var/lib/docker/containers/

# ── Logs Nginx (si montés en volume sur l'hôte) ──────────────────────
# Décommenter si vous montez /var/log/nginx dans un volume hôte
# /var/log/nginx/access.log
# /var/log/nginx/error.log {
#     daily
#     rotate 14
#     compress
#     delaycompress
#     missingok
#     notifempty
#     sharedscripts
#     postrotate
#         # Recharge Nginx pour ré-ouvrir les fichiers log
#         docker exec instantmusic_nginx_prod nginx -s reopen 2>/dev/null || true
#     endscript
# }
