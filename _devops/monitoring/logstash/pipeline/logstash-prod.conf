input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # ── Logs structurés JSON envoyés par le backend Django via python-logstash (TCP) ──
  # Le champ [type] = "django" est ajouté par TCPLogstashHandler (message_type="django").
  if [type] == "django" {
    if [message] =~ /^\{/ {
      json {
        source => "message"
        target => "django"
      }
    } else {
      grok {
        match => { "message" => "%{LOGLEVEL:level}\s+%{TIMESTAMP_ISO8601:timestamp}\s+%{WORD:module}\s+%{GREEDYDATA:msg}" }
        tag_on_failure => ["_grokparsefailure"]
      }
    }
    date {
      match => [ "timestamp", "ISO8601" ]
    }

    # Promouvoir les champs structurés Django au premier niveau pour Kibana
    if [django][status_code] {
      mutate { add_field => { "http_status_code" => "%{[django][status_code]}" } }
      mutate { convert => { "http_status_code" => "integer" } }
    }
    if [django][method] {
      mutate { add_field => { "http_method" => "%{[django][method]}" } }
    }
    if [django][path] {
      mutate { add_field => { "http_path" => "%{[django][path]}" } }
    }
    if [django][request_id] {
      mutate { add_field => { "request_id" => "%{[django][request_id]}" } }
    }
    if [django][user_id] {
      mutate { add_field => { "user_id" => "%{[django][user_id]}" } }
    }
    if [django][duration_ms] {
      mutate { add_field => { "duration_ms" => "%{[django][duration_ms]}" } }
      mutate { convert => { "duration_ms" => "float" } }
    }
    if [django][response_body] {
      mutate { add_field => { "response_body" => "%{[django][response_body]}" } }
    }
    if [django][error_detail] {
      mutate { add_field => { "error_detail" => "%{[django][error_detail]}" } }
    }
    if [django][exception_type] {
      mutate { add_field => { "exception_type" => "%{[django][exception_type]}" } }
    }
    if [django][view] {
      mutate { add_field => { "view" => "%{[django][view]}" } }
    }
    if [django][traceback] {
      mutate { add_field => { "traceback" => "%{[django][traceback]}" } }
    }
    if [django][query_string] {
      mutate { add_field => { "query_string" => "%{[django][query_string]}" } }
    }

    # Classifier le niveau d'erreur pour les dashboards Kibana
    if [http_status_code] {
      if [http_status_code] >= 500 {
        mutate { add_field => { "error_level" => "server_error" } }
      } else if [http_status_code] >= 400 {
        mutate { add_field => { "error_level" => "client_error" } }
      } else {
        mutate { add_field => { "error_level" => "success" } }
      }
    }

    mutate {
      add_field => { "app" => "instantmusic" }
      add_field => { "component" => "django" }
    }
  }

  # ── Logs Celery ──
  if [service] == "celery" {
    grok {
      match => { "message" => "\[%{TIMESTAMP_ISO8601:timestamp}: %{LOGLEVEL:level}/%{WORD:process}\] %{GREEDYDATA:msg}" }
      tag_on_failure => ["_grokparsefailure"]
    }
    date {
      match => [ "timestamp", "ISO8601" ]
    }
    mutate {
      add_field => { "app" => "instantmusic" }
      add_field => { "component" => "celery" }
    }
  }

  # ── Logs Nginx ──
  if [service] == "nginx" {
    grok {
      match => { "message" => '%{IPORHOST:client_ip} - %{DATA:user} \[%{HTTPDATE:timestamp}\] "%{WORD:method} %{URIPATHPARAM:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status_code} %{NUMBER:body_bytes} "%{DATA:referrer}" "%{DATA:user_agent}"' }
      tag_on_failure => ["_grokparsefailure"]
    }
    date {
      match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
    }
    mutate {
      convert => { "status_code" => "integer" }
      convert => { "body_bytes" => "integer" }
      add_field => { "app" => "instantmusic" }
      add_field => { "component" => "nginx" }
    }
    if [status_code] >= 500 {
      mutate { add_field => { "error_level" => "server_error" } }
    } else if [status_code] >= 400 {
      mutate { add_field => { "error_level" => "client_error" } }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "logstash_writer"
    password => "${LOGSTASH_ES_PASSWORD}"
    index => "instantmusic-%{+YYYY.MM.dd}"
  }
}
